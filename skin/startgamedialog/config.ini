width = 325
height = 200
fixed-size = 1
var d = 20
var w = ~formwidth - 2*$d

cmdDX8.X = $d
cmdDX8.Y = $d
cmdDX8.width = 285
cmdDX8.height = 38

cmdDX9.X = $d
cmdDX9.Y = $cmdDX8.Y + $cmdDX9.height + 5
cmdDX9.width = 285
cmdDX9.height = 38

cmdOpenGL.X = $d
cmdOpenGL.Y = $cmdDX9.Y + $cmdDX9.height + 5
cmdOpenGL.width = 285
cmdOpenGL.height = 38

chkDoNotAskAgain.X = (~formwidth - $chkDoNotAskAgain.width) / 2
chkDoNotAskAgain.Y = $cmdOpenGL.Y + $cmdDX9.height + 13
chkDoNotAskAgain.width = 98
chkDoNotAskAgain.height = 28
